<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matchboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Matchboard</h1>
        <span class="brand-tagline">Your AI Scrum Companion</span>
      </div>
      <nav>
        <a href="{{ url_for('chat') }}" class="active">Chat</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="chat-window" id="chatWindow"></div>

    <div class="input-section">
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      {% for message in messages %}
      <div class="flash">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form class="input-area" id="chatForm">
        <input type="text" id="chatMessage" placeholder="What do you want to accomplish today?" autocomplete="off">
        <button type="submit" class="send-btn">Send</button>
      </form>

      <form method="post" action="{{ url_for('upload_pdf') }}" enctype="multipart/form-data" class="upload-row">
        
        <input type="file" id="project_pdf" name="project_pdf" accept="application/pdf">
        <button type="submit">Add PDF</button>
      </form>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
