<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrum AI Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: white;
      padding: 12px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 18px;
      color: #333;
      font-weight: 600;
    }

    nav {
      display: flex;
      gap: 16px;
    }

    nav a {
      padding: 6px 12px;
      text-decoration: none;
      color: #666;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    nav a:hover {
      background: #f0f0f0;
    }

    nav a.active {
      color: #2563eb;
      background: #eff6ff;
    }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 0;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.agent {
      background: #f0f0f0;
      align-self: flex-start;
      color: #333;
    }

    .message.user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
    }

    .input-section {
      border-top: 1px solid #e0e0e0;
      padding: 16px 20px;
      background: white;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      background: #f9f9f9;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
    }

    .send-btn {
      padding: 8px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      min-width: 60px;
    }

    .send-btn:hover {
      background: #1d4ed8;
    }

    .upload-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .upload-row label {
      color: #666;
      font-weight: 500;
      min-width: fit-content;
    }

    input[type="file"] {
      font-size: 12px;
      flex: 1;
    }

    .upload-row button {
      padding: 6px 12px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      font-weight: 500;
    }

    .upload-row button:hover {
      background: #e0e0e0;
    }

    .flash {
      padding: 8px 12px;
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: 6px;
      color: #166534;
      font-size: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Scrum AI Agent</h1>
    <nav>
      <a href="{{ url_for('chat') }}" class="active">💬 Chat</a>
      <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
    </nav>
  </header>

  <main>
    <div class="chat-window" id="chatWindow"></div>

    <div class="input-section">
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      {% for message in messages %}
      <div class="flash">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form class="input-area" id="chatForm">
        <input type="text" id="chatMessage" placeholder="Descreve o teu projeto..." autocomplete="off">
        <button type="submit" class="send-btn">Enviar</button>
      </form>

      <form method="post" action="{{ url_for('upload_pdf') }}" enctype="multipart/form-data" class="upload-row">
        <label>📄</label>
        <input type="file" id="project_pdf" name="project_pdf" accept="application/pdf">
        <button type="submit">Carregar PDF</button>
      </form>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
