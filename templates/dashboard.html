<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matchboard - Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Matchboard</h1>
        <span class="brand-tagline">Your AI Scrum Companion</span>
      </div>
      <nav>
        <a href="{{ url_for('chat') }}">Chat</a>
        <a href="{{ url_for('dashboard') }}" class="active">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <!-- Métricas -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">User Stories</div>
        <div class="metric-value" id="totalStories">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Tasks</div>
        <div class="metric-value" id="totalTasks">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Story Points</div>
        <div class="metric-value" id="totalPoints">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Sprints</div>
        <div class="metric-value" id="totalSprints">0</div>
      </div>
    </div>

    <!-- Sprints -->
    <div class="sprints-section">
      <div class="sprints-header">Sprints and Backlogs</div>
      <div id="sprintsList">
        <div class="empty-state">
          <p>No sprint generated today. Send a project in the chat to get started!</p>
        </div>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
